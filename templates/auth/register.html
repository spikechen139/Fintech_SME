{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3">Create Account</h3>
                <form method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Business Registration Number</label>
                            <input type="text" name="br_number" class="form-control" placeholder="e.g. 12345678-000" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Established Year</label>
                        <input type="number" name="established_year" class="form-control" min="1900" max="2100" required>
                    </div>
                    <button class="btn btn-success w-100" type="submit">Register</button>
                </form>
                <p class="mt-3 mb-0">
                    By registering, you agree to our
                    <a href="{{ url_for('dashboard.privacy') }}">Privacy Policy</a>.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
